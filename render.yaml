services:
  - type: web
    name: sentinelmesh-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w @sentinelmesh/api
    startCommand: npm run start -w @sentinelmesh/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: REPORTS_DB_PATH
        value: data/reports.json
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ALLOW_CLIENT_SUPPLIED_ONCHAIN_HASH
        value: "false"
      - key: GROQ_API_KEY
        sync: false
      - key: REPORT_REGISTRY_ADDRESS
        sync: false
      - key: REPORT_REGISTRY_CHAIN_ID
        value: "84532"
      - key: REPORT_REGISTRY_RPC_URL
        sync: false
